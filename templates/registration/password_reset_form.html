{% extends 'base.html' %}
{% load static %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg></div>
        <h1>Reset Password</h1>
        <p class="auth-subtitle">We'll email you a secure reset link</p>
    </div>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert-error">Please enter a valid email address.</div>
        {% endif %}
        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
    </form>

    <div class="auth-footer" style="margin-top:12px;">
        <a href="{% url 'login' %}" class="btn btn-ghost btn-full">Back to Sign In</a>
    </div>
</div>
{% endblock %}
