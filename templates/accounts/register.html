{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo"><svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
</svg></div>
        <h1>Create Account</h1>
        <p class="auth-subtitle">Your data, your keys — zero trust</p>
    </div>
    <form method="post" class="auth-form">
        {% csrf_token %}
        <a href="{% url 'google_signin_start' %}" class="btn btn-ghost btn-full"
            style="margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;background:#ffffff;color:#111827;border:1px solid #d1d5db;box-shadow:0 8px 20px rgba(0,0,0,0.08);">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.3l-6.3-5.2c-2 1.5-4.5 2.5-7.3 2.5-5.2 0-9.6-3.3-11.1-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.4-2.3 4.4-4 5.8l6.3 5.2C37.2 39.3 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/>
            </svg>
            Continue with Google
        </a>

        <div class="form-separator"><span>or</span></div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autofocus placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="email">Email (optional)</label>
            <input type="email" name="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required minlength="10"
                placeholder="Min 10 characters">
        </div>
        <div class="form-group">
            <label for="password2">Confirm Password</label>
            <input type="password" name="password2" id="password2" required placeholder="Confirm your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Create Account</button>
    </form>
    <div class="auth-footer">
        <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
    </div>
</div>
{% endblock %}
